spring.application.name=mockspring

# ============================================================================
# DBDOCS Configuration
# ============================================================================

# Validation Configuration
dbdocs.validation.enabled=true
dbdocs.validation.fail-on-violation=false

dbdocs.versioning.enabled=true
dbdocs.versioning.storage-dir=./dbdocs-schemas
dbdocs.versioning.max-versions=20

# ============================================================================
# Database Configuration
# ============================================================================


spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Optional: Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console