spring.application.name=mockspring

# ============================================================================
# DBVCS Configuration
# ============================================================================

# ── Validation Configuration ──
dbvcs.validation.enabled=true
dbvcs.validation.fail-on-violation=false

# ── Scanning Configuration ──
dbvcs.scanning.enabled=true
dbvcs.scanning.packages=com.spring.mockspring.entity

# ── UI Configuration ──
dbvcs.ui.path=/dbvcs

# ── Versioning Configuration ──
# Set to true to enable schema versioning and file persistence
dbvcs.versioning.enabled=true
dbvcs.versioning.storage-dir=./dbvcs-schemas

# ============================================================================
# Database Configuration
# ============================================================================


spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Optional: Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console