spring.application.name=mockspring

# dbvcs — schema version control
dbvcs.enabled=true
dbvcs.output-dir=dbvcs-schemas
dbvcs.base-packages=com.spring.mockspring

# ─────────────────────────────────────────────────────────────────────────────
# dbvcs allowed-values — project-specific vocabularies for metadata annotations
#
# Every list below overrides the library's built-in defaults.
# Add your own values freely; the annotations accept any String.
# ─────────────────────────────────────────────────────────────────────────────

# @Domain(name = "...")
dbvcs.allowed-values.domains=CUSTOMER,FINANCE,PAYMENTS,ORDERS,INVENTORY,LOGISTICS,COMPLIANCE,SECURITY,ANALYTICS,OTHER

# @Criticality(level = "...")
dbvcs.allowed-values.criticality-levels=LOW,MEDIUM,HIGH,CRITICAL

# @TableType(type = "...")
dbvcs.allowed-values.table-types=MASTER,TRANSACTIONAL,LOOKUP,CONFIGURATION,STAGING,AUDIT,HISTORY,TEMPORARY

# @SourceSystem(name = "...")
dbvcs.allowed-values.source-systems=CRM,ERP,SAP,SALESFORCE,INTERNAL,MANUAL,API,ETL,LEGACY,OTHER

# @DataClassification(level = "...")
dbvcs.allowed-values.data-classification-levels=PUBLIC,INTERNAL,CONFIDENTIAL,RESTRICTED

# @AccessLevel(level = "...")
dbvcs.allowed-values.access-levels=PUBLIC,INTERNAL_ONLY,RESTRICTED,ADMIN_ONLY

# @Encrypted(algorithm = "...")
dbvcs.allowed-values.encryption-types=AES128,AES256,RSA,BCRYPT,ARGON2,OTHER

# @DataRetention(type = "...")
dbvcs.allowed-values.retention-types=ONE_YEAR,THREE_YEARS,FIVE_YEARS,SEVEN_YEARS,TEN_YEARS,INDEFINITE,UNTIL_CONSENT_WITHDRAWN,CUSTOM

# @RefreshFrequency(value = "...")
dbvcs.allowed-values.frequencies=REALTIME,HOURLY,DAILY,WEEKLY,MONTHLY

# @UpdateStrategy(value = "...")
dbvcs.allowed-values.update-types=APPEND_ONLY,UPSERT,FULL_REFRESH,EVENT_DRIVEN

# ─────────────────────────────────────────────────────────────────────────────
# dbvcs annotation validation
# ─────────────────────────────────────────────────────────────────────────────

# Enable runtime annotation checking
dbvcs.validation.enabled=true

# Whether missing annotations cause startup to fail (false = warn only)
dbvcs.validation.fail-on-violation=true

# Annotations required on all @Entity classes in the scanned packages
dbvcs.validation.required-annotations=Domain,BusinessModule,DataClassification,Lifecycle

# Package-specific rules (first match wins, merged with global above)
# Entities in the customer package also need ownership annotations
dbvcs.validation.rules[0].package-pattern=com.spring.mockspring.entity.**
dbvcs.validation.rules[0].required-annotations=Domain,BusinessModule,DataClassification,Lifecycle,BusinessOwner

dbvcs.validation.ignored-field-names=id,created_at,updated_at,created_by,updated_by,version,tenant_id


spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Optional: Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console